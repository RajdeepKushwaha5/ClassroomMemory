services:
  - type: web
    name: classroom-memory-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLASSROOM_MODE
        value: cloud
      - key: COGNEE_CLOUD_URL
        sync: false
      - key: COGNEE_CLOUD_API_KEY
        sync: false
